<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A&amp;P — Audit Stratégique &amp; Feuille de Route Digitale 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;0,800;1,600;1,700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   A&P — AUDIT STRATÉGIQUE 2026  |  "Emerald Authority"
   ============================================================ */
:root{
  --emerald:      #006837;
  --emerald-700:  #00532c;
  --emerald-900:  #00321b;
  --emerald-950:  #00220f;
  --lime:         #7AC943;
  --lime-bright:  #93E25C;
  --lime-dim:     #5BA62F;
  --white:        #FFFFFF;
  --anthracite:   #2D3748;
  --ink:          #1A2A22;
  --paper:        #F4F8F3;
  --paper-2:      #EAF1E8;
  --line-light:   rgba(0,104,55,0.12);
  --line-dark:    rgba(122,201,67,0.18);
  --serif: "Playfair Display", Georgia, serif;
  --sans:  "Montserrat", "Helvetica Neue", Arial, sans-serif;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  background:#000;
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
#stage{
  position:fixed; inset:0;
  background:radial-gradient(120% 120% at 50% 0%, #0a2c1c 0%, #051209 72%, #020805 100%);
  overflow:hidden;
}
#canvas{
  width:1920px; height:1080px;
  position:absolute; top:50%; left:50%;
  transform-origin:center center;
  transform:translate(-50%,-50%) scale(1);
  overflow:hidden;
  background:var(--paper);
}
.slide{
  position:absolute; inset:0;
  width:1920px; height:1080px;
  overflow:hidden;
}
.slide-dark{
  color:var(--white);
  background:
    radial-gradient(90% 85% at 88% 96%, rgba(122,201,67,.09) 0%, rgba(122,201,67,0) 55%),
    linear-gradient(152deg, #0d5230 0%, #093a22 50%, #03150c 100%);
}
.slide-paper{
  color:var(--ink);
  background:
    radial-gradient(90% 80% at 90% 100%, rgba(0,104,55,.06) 0%, rgba(0,104,55,0) 60%),
    linear-gradient(158deg, #ffffff 0%, #f2f7f0 54%, #e6efe3 100%);
}
@keyframes slideIn{
  from{ opacity:0; transform:translateX(var(--enter-x,60px)); }
  to  { opacity:1; transform:translateX(0); }
}
.slide-anim{ animation:slideIn .62s cubic-bezier(.22,1,.36,1) both; }
.rise{ opacity:0; transform:translateY(26px); }
.is-active .rise{ animation:rise .7s cubic-bezier(.22,1,.36,1) both; }
@keyframes rise{ to{ opacity:1; transform:translateY(0); } }
.d1{ animation-delay:.10s; } .d2{ animation-delay:.20s; }
.d3{ animation-delay:.30s; } .d4{ animation-delay:.40s; }
.d5{ animation-delay:.50s; } .d6{ animation-delay:.60s; }
.d7{ animation-delay:.70s; } .d8{ animation-delay:.80s; }
@media (prefers-reduced-motion: reduce){
  .slide-anim,.is-active .rise{ animation:none !important; }
  .rise{ opacity:1; transform:none; }
}
.eyebrow{
  font-family:var(--sans); font-weight:600;
  font-size:18px; letter-spacing:.32em; text-transform:uppercase;
}
.display{ font-family:var(--serif); font-weight:800; line-height:1.02; letter-spacing:-.01em; }
.serif{ font-family:var(--serif); }
.num{ font-variant-numeric:tabular-nums; }
.lime{ color:var(--lime); }
.t-emerald{ color:var(--emerald); }
.rule{ height:1px; background:currentColor; opacity:.18; border:0; }
.btn-lime{
  display:inline-flex; align-items:center; gap:12px;
  background:var(--lime); color:var(--emerald-950);
  font-family:var(--sans); font-weight:700; font-size:18px;
  letter-spacing:.02em;
  padding:16px 30px; border-radius:2px; border:0; cursor:pointer;
  transition:background .25s ease, transform .25s ease, box-shadow .25s ease;
}
.btn-lime:hover{ background:var(--lime-bright); transform:translateY(-2px);
  box-shadow:0 14px 34px rgba(122,201,67,.32); }
#progress-wrap{
  position:fixed; top:0; left:0; right:0; height:5px;
  background:rgba(255,255,255,0.06); z-index:50;
}
#progress-bar{
  height:100%; background:var(--lime);
  box-shadow:0 0 14px rgba(122,201,67,.6);
  transition:width .6s cubic-bezier(.22,1,.36,1);
}
#nav{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:22px; z-index:50;
  background:rgba(0,34,15,.55); backdrop-filter:blur(10px);
  border:1px solid rgba(122,201,67,.22);
  padding:10px 16px; border-radius:100px;
}
.nav-btn{
  width:42px; height:42px; border-radius:50%;
  border:1px solid rgba(122,201,67,.35); background:transparent;
  color:var(--lime); cursor:pointer; display:flex; align-items:center;
  justify-content:center; transition:all .2s ease;
}
.nav-btn:hover{ background:var(--lime); color:var(--emerald-950); }
.nav-btn:disabled{ opacity:.25; cursor:default; }
.nav-btn:disabled:hover{ background:transparent; color:var(--lime); }
#dots{ display:flex; gap:9px; align-items:center; }
.dot{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.22);
  cursor:pointer; transition:all .25s ease; border:0; padding:0; }
.dot.on{ background:var(--lime); width:24px; border-radius:5px; }
#counter{ color:rgba(255,255,255,.7); font-family:var(--sans);
  font-size:13px; font-weight:600; letter-spacing:.15em; min-width:54px; text-align:center; }
.browser{
  background:#fff; border-radius:10px; overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.28); border:1px solid rgba(0,0,0,.06);
}
.browser-bar{
  height:44px; background:#EDEFEC; display:flex; align-items:center;
  gap:8px; padding:0 16px; border-bottom:1px solid rgba(0,0,0,.07);
}
.browser-dot{ width:11px; height:11px; border-radius:50%; }
.browser-url{
  flex:1; height:24px; background:#fff; border-radius:6px; margin-left:14px;
  display:flex; align-items:center; padding:0 12px; font-family:var(--sans);
  font-size:12px; color:#8a948c; border:1px solid rgba(0,0,0,.06);
}
.tile{
  position:relative;
  background:linear-gradient(160deg, rgba(255,255,255,.07) 0%, rgba(4,25,15,.32) 100%);
  border:1px solid rgba(122,201,67,.16);
  border-radius:8px; padding:42px 38px; overflow:hidden;
  transition:transform .4s cubic-bezier(.22,1,.36,1), background .4s ease, border-color .4s ease;
  cursor:pointer; height:100%;
}
.tile:hover{ transform:translateY(-10px);
  background:linear-gradient(160deg, rgba(122,201,67,.12) 0%, rgba(4,25,15,.5) 100%);
  border-color:rgba(122,201,67,.5); }
.tile::after{
  content:""; position:absolute; left:0; bottom:0; height:4px; width:0;
  background:var(--lime); transition:width .45s cubic-bezier(.22,1,.36,1);
}
.tile:hover::after{ width:100%; }
.tile-num{ font-family:var(--serif); font-size:64px; line-height:1;
  color:rgba(122,201,67,.28); font-weight:800; }
.tile-reveal{ max-height:0; opacity:0; overflow:hidden;
  transition:max-height .45s ease, opacity .35s ease, margin-top .45s ease; }
.tile:hover .tile-reveal{ max-height:200px; opacity:1; margin-top:18px; }
::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<!-- ============================================================

<script type="text/babel">
function Icon({ name, size = 30, stroke = "#7AC943", sw = 2 }) {
  const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
    stroke, strokeWidth: sw, strokeLinecap: "round", strokeLinejoin: "round" };
  const paths = {
    warning: <><path d="M12 3 2.5 20h19L12 3Z" /><line x1="12" y1="10" x2="12" y2="14" /><circle cx="12" cy="17.4" r=".5" fill={stroke} /></>,
    link: <><path d="M14 4h6v6" /><path d="M20 4 11 13" /><path d="M18 14v5a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1h5" /></>,
    doc: <><path d="M14 3H7a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V7l-4-4Z" /><path d="M14 3v4h4" /><line x1="9" y1="13" x2="15" y2="13" /><line x1="9" y1="16.5" x2="13" y2="16.5" /></>,
    layers: <><path d="M12 3 3 8l9 5 9-5-9-5Z" /><path d="M3 13l9 5 9-5" /><path d="M3 16.5l9 5 9-5" /></>,
    mobile: <><rect x="7" y="3" width="10" height="18" rx="2" /><line x1="11" y1="18" x2="13" y2="18" /></>,
    search: <><circle cx="11" cy="11" r="7" /><line x1="16.5" y1="16.5" x2="21" y2="21" /></>,
    target: <><circle cx="12" cy="12" r="8" /><circle cx="12" cy="12" r="3.4" /></>,
    shield: <><path d="M12 3 5 6v5c0 4.4 3 8 7 10 4-2 7-5.6 7-10V6l-7-3Z" /><path d="M9 12l2 2 4-4" /></>,
    compass: <><circle cx="12" cy="12" r="9" /><path d="M15.5 8.5 13 13l-4.5 2.5L11 11l4.5-2.5Z" /></>,
    arrow: <><line x1="4" y1="12" x2="20" y2="12" /><path d="M14 6l6 6-6 6" /></>,
    check: <><path d="M5 12.5 10 17l9-10" /></>,
    flag: <><line x1="5" y1="22" x2="5" y2="3" /><path d="M5 4h12l-2.5 4L17 12H5" /></>,
    trending: <><path d="M3 17l6-6 4 4 8-8" /><path d="M21 7h-5M21 7v5" /></>,
    book: <><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2V5Z" /><path d="M4 19a2 2 0 0 1 2-2h13" /></>,
    users: <><circle cx="9" cy="8" r="3.2" /><path d="M3.5 19c0-3 2.4-5 5.5-5s5.5 2 5.5 5" /><path d="M16 5.4a3 3 0 0 1 0 5.6" /><path d="M20.5 19c0-2.3-1.5-4.1-3.6-4.7" /></>,
    globe: <><circle cx="12" cy="12" r="9" /><path d="M3 12h18" /><path d="M12 3c2.8 2.6 2.8 15.4 0 18M12 3c-2.8 2.6-2.8 15.4 0 18" /></>,
    mic: <><rect x="9" y="3" width="6" height="11" rx="3" /><path d="M5 11a7 7 0 0 0 14 0" /><line x1="12" y1="18" x2="12" y2="21" /></>,
    camera: <><rect x="2" y="7" width="20" height="14" rx="2" /><circle cx="12" cy="14" r="4" /><path d="M8 7l2-4h4l2 4" /></>,
    grid: <><rect x="3.5" y="3.5" width="7" height="7" rx="1" /><rect x="13.5" y="3.5" width="7" height="7" rx="1" /><rect x="3.5" y="13.5" width="7" height="7" rx="1" /><rect x="13.5" y="13.5" width="7" height="7" rx="1" /></>,
    building: <><rect x="5" y="3" width="14" height="18" rx="1" /><path d="M9 21v-4h6v4" /><line x1="9" y1="7" x2="9.5" y2="7" /><line x1="14.5" y1="7" x2="15" y2="7" /><line x1="9" y1="11" x2="9.5" y2="11" /><line x1="14.5" y1="11" x2="15" y2="11" /></>,
    spark: <><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M18 6l-2.5 2.5M8.5 15.5 6 18" /></>,
  };
  return <svg {...common}>{paths[name]}</svg>;
}

function MiniSite({ buggy }) {
  const navItem = (active) => ({ fontSize: 12.5, fontWeight: active ? 700 : 600, color: active ? "#1f6b3a" : "#5b6660", whiteSpace: "nowrap" });
  return (
    <div style={{ width: "100%", height: "100%", background: "#fff", position: "relative", fontFamily: "var(--sans)", userSelect: "none", overflow: "hidden" }}>
      <div style={{ position: "absolute", top: 70, left: 0, right: 0, padding: "0 34px", zIndex: 1 }}>
        <div style={{ fontSize: 10.5, letterSpacing: ".2em", textTransform: "uppercase", color: "#9aa39c", fontWeight: 700 }}>Classements &amp; Distinctions</div>
        <h2 style={{ fontFamily: "var(--serif)", fontSize: 19, fontWeight: 800, color: "#1c2b24", margin: "10px 0 0", lineHeight: 1.28 }}>
          Elise Ngo Nyobe — &laquo;&nbsp;up and coming<br />practitioner&nbsp;&raquo; · Chambers Global.
        </h2>
        <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
          {["Chambers", "Legal 500", "IFLR1000"].map((b) => (
            <div key={b} style={{ height: 40, padding: "0 16px", borderRadius: 6, border: "1px solid #e7eae7",
              display: "flex", alignItems: "center", gap: 7, fontSize: 12, fontWeight: 700, color: "#1f6b3a", background: "#f7faf6" }}>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#7AC943" }} />{b}
            </div>
          ))}
        </div>
      </div>
      <div style={{ position: "absolute", top: 0, left: 0, right: 0,
        height: buggy ? 104 : 52, background: "#fff", zIndex: 30,
        display: "flex", alignItems: "center", paddingTop: 0,
        justifyContent: "space-between", padding: "0 28px",
        borderBottom: buggy ? "3px solid #E5484D" : "1px solid #eceeec",
        boxShadow: buggy ? "0 8px 16px rgba(0,0,0,.12)" : "none" }}>
        <div style={{ fontFamily: "var(--serif)", fontWeight: 800, fontSize: 17, color: "#1f6b3a", whiteSpace: "nowrap" }}>Cabinet&nbsp;Juridique</div>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <span style={navItem(false)}>Accueil</span>
          <span style={navItem(true)}>Classements</span>
          <span style={navItem(false)}>Expertise</span>
          <span style={navItem(false)}>Équipe</span>
        </div>
      </div>
      {buggy && (
        <div style={{ position: "absolute", bottom: 14, left: 28, display: "flex", alignItems: "center", gap: 6,
          background: "#E5484D", color: "#fff", fontSize: 11, fontWeight: 700, padding: "6px 12px",
          borderRadius: 4, zIndex: 60, whiteSpace: "nowrap", boxShadow: "0 6px 16px rgba(229,72,77,.4)" }}>
          ⚠ La nav recouvre le titre (z-index)
        </div>
      )}
    </div>
  );
}

function AvantApres() {
  const [pos, setPos] = React.useState(52);
  const ref = React.useRef(null);
  const dragging = React.useRef(false);
  const move = (clientX) => {
    const r = ref.current.getBoundingClientRect();
    let p = ((clientX - r.left) / r.width) * 100;
    p = Math.max(6, Math.min(94, p));
    setPos(p);
  };
  React.useEffect(() => {
    const mm = (e) => { if (dragging.current) move(e.touches ? e.touches[0].clientX : e.clientX); };
    const mu = () => { dragging.current = false; };
    window.addEventListener("mousemove", mm); window.addEventListener("mouseup", mu);
    window.addEventListener("touchmove", mm, { passive: false }); window.addEventListener("touchend", mu);
    return () => { window.removeEventListener("mousemove", mm); window.removeEventListener("mouseup", mu);
      window.removeEventListener("touchmove", mm); window.removeEventListener("touchend", mu); };
  }, []);
  return (
    <div className="browser" style={{ width: "100%" }}>
      <div className="browser-bar">
        <span className="browser-dot" style={{ background: "#ff5f57" }} />
        <span className="browser-dot" style={{ background: "#febc2e" }} />
        <span className="browser-dot" style={{ background: "#28c840" }} />
        <span className="browser-url">https://amadagana-partners.com/classements</span>
      </div>
      <div ref={ref} style={{ position: "relative", height: 260, overflow: "hidden", cursor: "ew-resize" }}
        onMouseDown={(e) => { dragging.current = true; move(e.clientX); }}
        onTouchStart={(e) => { dragging.current = true; move(e.touches[0].clientX); }}>
        <div style={{ position: "absolute", inset: 0 }}><MiniSite buggy={false} /></div>
        <div style={{ position: "absolute", inset: 0, clipPath: `inset(0 ${100 - pos}% 0 0)` }}>
          <MiniSite buggy={true} />
        </div>
        <span style={{ position: "absolute", top: 14, left: 14, background: "#E5484D", color: "#fff",
          fontSize: 12, fontWeight: 700, padding: "5px 12px", borderRadius: 3, letterSpacing: ".08em", zIndex: 70 }}>AVANT</span>
        <span style={{ position: "absolute", top: 14, right: 14, background: "#1f6b3a", color: "#fff",
          fontSize: 12, fontWeight: 700, padding: "5px 12px", borderRadius: 3, letterSpacing: ".08em", zIndex: 70 }}>APRÈS</span>
        <div style={{ position: "absolute", top: 0, bottom: 0, left: `calc(${pos}% - 1px)`, width: 2,
          background: "#7AC943", zIndex: 75, boxShadow: "0 0 14px rgba(122,201,67,.7)" }}>
          <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)",
            width: 42, height: 42, borderRadius: "50%", background: "#7AC943",
            display: "flex", alignItems: "center", justifyContent: "center", color: "#00220f",
            fontWeight: 800, fontSize: 16, boxShadow: "0 4px 14px rgba(0,0,0,.3)" }}>⇆</div>
        </div>
      </div>
    </div>
  );
}

window.Icon = Icon;
window.MiniSite = MiniSite;
window.AvantApres = AvantApres;
</script>

<script type="text/babel">
function Frame({ url, children, h = 300 }) {
  return (
    <div className="browser" style={{ width: "100%" }}>
      <div className="browser-bar">
        <span className="browser-dot" style={{ background: "#ff5f57" }} />
        <span className="browser-dot" style={{ background: "#febc2e" }} />
        <span className="browser-dot" style={{ background: "#28c840" }} />
        <span className="browser-url">{url}</span>
      </div>
      <div style={{ position: "relative", height: h, overflow: "hidden", background: "#fff", fontFamily: "var(--sans)", userSelect: "none" }}>
        {children}
      </div>
    </div>
  );
}

function EvEquipe() {
  return (
    <Frame url="https://amadagana-partners.com/equipe">
      <div style={{ display: "flex", alignItems: "center", height: "100%", padding: "0 26px", gap: 0 }}>
        <div style={{ width: 220, border: "1px solid #e7eae7", borderRadius: 8, padding: "18px", background: "#fff", flexShrink: 0 }}>

<!-- ============================================================
     APP SHELL — Navigation & Scaling
     ============================================================ -->
<script type="text/babel">
const SLIDES = [Slide1, Slide2, Slide3, SlideSEO, Slide4, Slide5, Slide6, SlideCharte, Slide7, Slide8];
const KEY = "ap_audit_slide";

function Deck() {
  const [i, setI] = React.useState(() => {
    const s = parseInt(localStorage.getItem(KEY) || "0", 10);
    return isNaN(s) || s < 0 || s >= SLIDES.length ? 0 : s;
  });
  const [dir, setDir] = React.useState(1);

  const go = React.useCallback((n) => {
    setI((cur) => {
      const next = Math.max(0, Math.min(SLIDES.length - 1, n));
      setDir(next >= cur ? 1 : -1);
      return next;
    });
  }, []);

  React.useEffect(() => { localStorage.setItem(KEY, String(i)); }, [i]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (["ArrowRight", " ", "PageDown"].includes(e.key)) { e.preventDefault(); go(iRef.current + 1); }
      else if (["ArrowLeft", "PageUp"].includes(e.key)) { e.preventDefault(); go(iRef.current - 1); }
      else if (e.key === "Home") go(0);
      else if (e.key === "End") go(SLIDES.length - 1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [go]);

  const iRef = React.useRef(i);
  iRef.current = i;

  React.useEffect(() => {
    const fit = () => {
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      const c = document.getElementById("canvas");
      if (c) c.style.transform = `translate(-50%,-50%) scale(${s})`;
    };
    fit();
    window.addEventListener("resize", fit);
    return () => window.removeEventListener("resize", fit);
  }, []);

  const Current = SLIDES[i];
  const pct = ((i + 1) / SLIDES.length) * 100;

  return (
    <>
      <div id="progress-wrap"><div id="progress-bar" style={{ width: pct + "%" }} /></div>
      <div id="canvas">
        <div key={i} className="is-active slide-anim" style={{ "--enter-x": dir > 0 ? "70px" : "-70px" }}>
          <Current />
        </div>
      </div>
      <div id="nav">
        <button className="nav-btn" onClick={() => go(i - 1)} disabled={i === 0} aria-label="Précédent">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M15 6l-6 6 6 6" /></svg>
        </button>
        <div id="dots">
          {SLIDES.map((_, k) => (
            <button key={k} className={"dot" + (k === i ? " on" : "")} onClick={() => go(k)} aria-label={`Slide ${k + 1}`} />
          ))}
        </div>
        <span id="counter" className="num">{String(i + 1).padStart(2, "0")} / {String(SLIDES.length).padStart(2, "0")}</span>
        <button className="nav-btn" onClick={() => go(i + 1)} disabled={i === SLIDES.length - 1} aria-label="Suivant">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6" /></svg>
        </button>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("stage")).render(<Deck />);
</script>
